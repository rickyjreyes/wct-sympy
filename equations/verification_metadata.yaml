version: 1
objects:
  E1A:
    verification_kind: DIMENSIONAL_CHECK
    scope: INTERNAL_CONSISTENCY
    meaning: The curvature-rate density has inverse-length-squared dimension.
    empirical_status: NOT_APPLICABLE
  E1B:
    verification_kind: DIMENSIONAL_CHECK
    scope: INTERNAL_CONSISTENCY
    meaning: The curvature spectral rate has inverse-length dimension.
    empirical_status: NOT_APPLICABLE
  E2:
    verification_kind: ALGEBRAIC_IDENTITY
    scope: STANDARD_MATHEMATICS
    meaning: The positive weighted-average construction has a nonzero denominator and preserves the encoded dimension of the averaged quantity.
    empirical_status: NOT_APPLICABLE
  M4:
    verification_kind: FORMAL_THEOREM
    scope: STANDARD_MATHEMATICS
    meaning: The standard Sobolev embedding threshold H2 to L-infinity holds under the declared domain hypotheses for integer spatial dimension n less than or equal to 3.
    limitations:
      - This standard embedding theorem is not by itself a complete nonlinear WCT stability theorem.
    empirical_status: NOT_APPLICABLE
  E5:
    verification_kind: SYMBOLIC_DERIVATION
    scope: MODEL_CONDITIONAL
    meaning: Exact loop closure and the declared orientation and weighting assumptions establish the encoded effective-wavenumber chain.
    limitations:
      - This does not independently establish that physical particle masses are generated by the model.
    empirical_status: NOT_TESTED
  E6:
    verification_kind: DIMENSIONAL_CHECK
    scope: INTERNAL_CONSISTENCY
    meaning: The encoded mass-curvature relation has the dimensions of mass.
    limitations:
      - Dimensional closure does not establish the physical identification of mass with curvature.
    empirical_status: NOT_TESTED
  E7:
    verification_kind: DIMENSIONAL_CHECK
    scope: INTERNAL_CONSISTENCY
    meaning: The solenoidal curvature average has the dimensions required by the stated mass relation.
    limitations:
      - The averaging measure and physical identification require separate justification.
    empirical_status: NOT_TESTED
  E9:
    verification_kind: ALGEBRAIC_IDENTITY
    scope: INTERNAL_CONSISTENCY
    meaning: Polar decomposition yields the normalized phase-current identity under the declared nonzero-field assumptions.
    empirical_status: NOT_APPLICABLE
  E13:
    verification_kind: VARIATIONAL_DERIVATION
    scope: MODEL_CONDITIONAL
    meaning: The declared band-pass amplitude equation follows from negative gradient flow of the registered functional.
    empirical_status: NOT_TESTED
  E14:
    verification_kind: VARIATIONAL_DERIVATION
    scope: MODEL_CONDITIONAL
    meaning: The registered functional generates the declared band-pass gradient flow under the stated sign convention.
    empirical_status: NOT_TESTED
  E18:
    verification_kind: VARIATIONAL_DERIVATION
    scope: MODEL_CONDITIONAL
    meaning: Exact negative gradient flow gives monotone energy descent when the registered nonnegativity assumptions hold.
    empirical_status: NOT_TESTED
  E24:
    verification_kind: FORMAL_THEOREM
    scope: STANDARD_MATHEMATICS
    meaning: The standard H2-to-L-infinity Sobolev embedding threshold is verified under the declared domain hypotheses.
    limitations:
      - The theorem supplies a regularity route and does not characterize every possible confinement mechanism.
    empirical_status: NOT_APPLICABLE
  E30:
    verification_kind: ALGEBRAIC_IDENTITY
    scope: STANDARD_MATHEMATICS
    meaning: The normalized spectral Shannon entropy satisfies its standard finite-support bounds.
    empirical_status: NOT_APPLICABLE
  E58:
    verification_kind: LIMIT_CHECK
    scope: MODEL_CONDITIONAL
    meaning: A strictly positive spectral offset bounds the declared Green kernel and removes the registered pole.
    empirical_status: NOT_TESTED
  E67:
    verification_kind: FORMAL_THEOREM
    scope: STANDARD_MATHEMATICS
    meaning: The general H2-to-L-infinity embedding route fails above three spatial dimensions under the declared Sobolev framework.
    limitations:
      - Failure of this regularity route does not exclude every conceivable higher-dimensional confinement mechanism.
    empirical_status: NOT_APPLICABLE
  E70:
    verification_kind: CONSISTENCY_CHECK
    scope: MODEL_CONDITIONAL
    meaning: The Sobolev threshold supports the declared three-dimensional regularity route; the universal WCT stability conclusion remains conditional.
    limitations:
      - This is not a biconditional characterization of every stable WCT solution.
      - Failure of the H2 embedding route above three dimensions is not by itself a universal impossibility theorem.
    empirical_status: NOT_TESTED
  CLE9:
    verification_kind: DIMENSIONAL_CHECK
    scope: INTERNAL_CONSISTENCY
    meaning: The registered electron-radius expression has the dimensions and numerical scale of the reduced Compton wavelength.
    limitations:
      - Reproducing a known length scale does not establish an independent WCT derivation of electron structure.
    empirical_status: NOT_APPLICABLE
  EZ:
    verification_kind: ALGEBRAIC_IDENTITY
    scope: STANDARD_MATHEMATICS
    meaning: The registered Cole-Hopf substitution reduces the encoded nonlinear equation under its stated assumptions.
    empirical_status: NOT_APPLICABLE
  CM9:
    verification_kind: ALGEBRAIC_IDENTITY
    scope: INTERNAL_CONSISTENCY
    meaning: The first-order velocity system is equivalent to the registered second-order oscillator system.
    empirical_status: NOT_TESTED
  CM11:
    verification_kind: SYMBOLIC_DERIVATION
    scope: MODEL_CONDITIONAL
    meaning: The registered curvature-diffusion equation integrates to the stated Gaussian damping envelope.
    empirical_status: NOT_TESTED
  CM12:
    verification_kind: DEFINITION_CHECK
    scope: DEFINITIONAL
    meaning: The object defines a dimensionless power-spectrum quantity and is not itself a cosmological derivation.
    empirical_status: NOT_APPLICABLE
  CM13:
    verification_kind: DEFINITION_CHECK
    scope: DEFINITIONAL
    meaning: The object defines peak-ratio bookkeeping quantities and is not itself a cosmological derivation.
    empirical_status: NOT_APPLICABLE
  CM16:
    verification_kind: DEFINITION_CHECK
    scope: DEFINITIONAL
    meaning: The object defines horizon-scale quantities and is not itself a cosmological derivation.
    empirical_status: NOT_APPLICABLE
  CM18:
    verification_kind: DEFINITION_CHECK
    scope: DEFINITIONAL
    meaning: The object defines a closure set for bookkeeping and is not a derivation of cosmology.
    empirical_status: NOT_APPLICABLE
