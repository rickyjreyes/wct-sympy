version: 1
lean_repository: rickyjreyes/wct-lean
lean_library_root: WCTLean
policy:
  sympy_pass_means: "The registered symbolic, dimensional, numerical, or counterexample check passed."
  lean_proved_means: "The named Lean declaration is kernel-checked in wct-lean."
  prohibition: "A SymPy PASS must never be reported as a Lean proof."
mappings:
  - sympy_id: D1_10
    registry: legacy
    sympy_claim: "(hbar / c) * k_eff has mass dimension"
    relationship: formalizes_same_claim
    lean_status: proved
    lean_source: WCTLean/Dimension.lean
    lean_declarations:
      - hbar_div_c_mul_k_is_mass

  - sympy_id: E6
    registry: full
    sympy_claim: "m = (hbar / c) <sigma>_w is dimensionally a mass"
    relationship: dimensional_support
    lean_status: proved
    lean_source: WCTLean/Dimension.lean
    lean_declarations:
      - hbar_div_c_mul_k_is_mass
      - weighted_average_preserves_dimension
    caveat: "Lean proves the dimensional closure, not the physical identification of mass with curvature."

  - sympy_id: E7
    registry: full
    sympy_claim: "The solenoidal curvature average gives the same mass dimension"
    relationship: dimensional_support
    lean_status: proved
    lean_source: WCTLean/Dimension.lean
    lean_declarations:
      - hbar_div_c_mul_k_is_mass
      - weighted_average_preserves_dimension
    caveat: "Lean proves dimensions only."

  - sympy_id: E2
    registry: full
    sympy_claim: "A weighted average preserves the dimension of the averaged scalar"
    relationship: formalizes_same_claim
    lean_status: proved
    lean_source: WCTLean/Dimension.lean
    lean_declarations:
      - weightedSum_dim
      - weighted_average_preserves_dimension

