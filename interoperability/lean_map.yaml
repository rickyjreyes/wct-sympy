version: 2
lean_repository: rickyjreyes/wct-lean
lean_library_root: WCTLean
policy:
  sympy_pass_means: "The registered symbolic, dimensional, numerical, or counterexample check passed."
  lean_proved_means: "The named Lean declaration is kernel-checked in wct-lean."
  prohibition: "A SymPy PASS must never be reported as a Lean proof."
mappings:
  - sympy_id: D1_10
    registry: legacy
    sympy_claim: "(hbar / c) * k_eff has mass dimension"
    relationship: formalizes_same_claim
    lean_status: proved
    lean_source: WCTLean/Dimension.lean
    lean_declarations:
      - hbar_div_c_mul_k_is_mass

  - sympy_id: E1A
    registry: full
    sympy_claim: "kappa^2 + tau^2 is an inverse-length-squared density"
    relationship: dimensional_support
    lean_status: proved
    lean_source: WCTLean/Curvature.lean
    lean_declarations:
      - kappa_sq_dim
      - tau_sq_dim

  - sympy_id: E1B
    registry: full
    sympy_claim: "sqrt(kappa^2 + tau^2) is an inverse-length spectral rate"
    relationship: dimensional_support
    lean_status: proved
    lean_source: WCTLean/Curvature.lean
    lean_declarations:
      - sqrt_inverse_length_squared
      - sqrt_kappa_sq_dim

  - sympy_id: E2
    registry: full
    sympy_claim: "A positive weighted average has a nonzero denominator and preserves the encoded dimension"
    relationship: formalizes_same_claim
    lean_status: proved
    lean_source: WCTLean/ResolvedAudit.lean
    lean_declarations:
      - densityWeightedAverage_denominator_ne_zero
      - weightedSum_dim
      - weighted_average_preserves_dimension

  - sympy_id: E3
    registry: full
    sympy_claim: "Nonnegative weights make the finite locking mismatch nonnegative and exact locking makes it zero"
    relationship: formalizes_same_claim
    lean_status: proved
    lean_source: WCTLean/ResolvedAudit.lean
    lean_declarations:
      - lockingMismatch_nonnegative
      - lockingMismatch_zero
    caveat: "Finite algebraic support; this is not an integral theorem on general curves."

  - sympy_id: E5
    registry: full
    sympy_claim: "Exact loop closure and a positive constant weight establish the effective-wavenumber chain"
    relationship: formalizes_same_claim
    lean_status: proved
    lean_source: WCTLean/DerivedAudit.lean
    lean_declarations:
      - effectiveWavenumber_eq_loopAverage
      - constantWeightedAverage_eq_loopAverage
      - resolved_e5_effectiveWavenumber_chain
    caveat: "Lean proves the algebraic implication under supplied closure and weighting hypotheses; it does not prove dynamic attainment of exact lock."

  - sympy_id: E6
    registry: full
    sympy_claim: "m = (hbar / c) <sigma>_w is dimensionally a mass"
    relationship: dimensional_support
    lean_status: proved
    lean_source: WCTLean/Dimension.lean
    lean_declarations:
      - hbar_div_c_mul_k_is_mass
      - weighted_average_preserves_dimension
    caveat: "Lean proves the dimensional closure, not the physical identification of mass with curvature."

  - sympy_id: E7
    registry: full
    sympy_claim: "The solenoidal curvature average gives the same mass dimension"
    relationship: dimensional_support
    lean_status: proved
    lean_source: WCTLean/Dimension.lean
    lean_declarations:
      - hbar_div_c_mul_k_is_mass
      - weighted_average_preserves_dimension
    caveat: "Lean proves dimensions only."

  - sympy_id: E9
    registry: full
    sympy_claim: "A supplied polar factorization yields the phase-current identity and zero residual is equivalent to the continuity equation"
    relationship: formalizes_same_claim
    lean_status: proved
    lean_source: WCTLean/DerivedAudit.lean
    lean_declarations:
      - polarCurrentProduct_im
      - phaseCurrent_of_polar_factorization
      - conservationResidual_zero_iff
    caveat: "Full functional differentiation of psi = sqrt(u) exp(i theta) remains outside this finite algebraic formalization."

  - sympy_id: E13
    registry: full
    sympy_claim: "The one-mode band-pass operator has the registered polynomial symbol"
    relationship: supporting_lemma_only
    lean_status: proved
    lean_source: WCTLean/DerivedAudit.lean
    lean_declarations:
      - bandpass_oneMode_symbol
    caveat: "This is not the full generalized Euler-Lagrange or nonlinear pattern-selection theorem."

  - sympy_id: E14
    registry: full
    sympy_claim: "The band-pass functional has kernel-checked positivity support and the registered one-mode symbol"
    relationship: supporting_lemma_only
    lean_status: proved
    lean_source: WCTLean/DerivedAudit.lean
    lean_declarations:
      - bandpass_oneMode_symbol
      - square_nonnegative
      - positive_quadratic_energy_nonnegative
    caveat: "These declarations support positivity and the one-mode symbol, not Lyapunov descent of the full functional."

  - sympy_id: E17
    registry: full
    sympy_claim: "The historical scalar denominator has an explicit zero and therefore requires repair"
    relationship: supporting_lemma_only
    lean_status: proved
    lean_source: WCTLean/ResolvedAudit.lean
    lean_declarations:
      - resolved_e17_counterexample
    caveat: "The counterexample proves failure of the historical scalar denominator; the complete modulus-squared complex operator remains a separate formalization target."

  - sympy_id: E18
    registry: full
    sympy_claim: "Nonnegative coefficients give nonnegative energy and an exact negative squared-norm rate implies monotone descent"
    relationship: supporting_lemma_only
    lean_status: proved
    lean_source: WCTLean/DerivedAudit.lean
    lean_declarations:
      - resolved_e18_energy_nonnegative
      - resolved_e18_gradientFlow_descent
    caveat: "The functional chain rule for the complete curvature energy is an explicit hypothesis, not a proved PDE theorem."

  - sympy_id: E58
    registry: full
    sympy_claim: "Positive spectral offset gives a positive Green denominator and the bound G(k) <= 1/r"
    relationship: formalizes_same_claim
    lean_status: proved
    lean_source: WCTLean/DerivedAudit.lean
    lean_declarations:
      - bandGreenDenominator_pos
      - bandGreenDenominator_ge_offset
      - bandGreenKernel_pos
      - bandGreenKernel_le_inverseOffset
      - bandGreenKernel_at_shell

  - sympy_id: E78
    registry: full
    sympy_claim: "Fourier/Fisher-information bound family"
    relationship: adjacent_todo_only
    lean_status: stated_todo
    lean_source: WCTLean/Fourier.lean
    lean_declarations:
      - cos_orthogonality_TODO
    caveat: "The declaration records a proposition and is not a proof."

  - sympy_id: CM9
    registry: full
    sympy_claim: "The photon and baryon second-order oscillator forms are equivalent to their first-order acceleration systems"
    relationship: formalizes_same_claim
    lean_status: proved
    lean_source: WCTLean/DerivedAudit.lean
    lean_declarations:
      - photonSecondOrder_iff_firstOrder
      - baryonSecondOrder_iff_firstOrder
    caveat: "The coefficient convention is fixed by the supplied definitions."

  - sympy_id: CURV1
    registry: legacy
    sympy_claim: "sqrt(kappa^2 + tau^2) has inverse-length dimension"
    relationship: dimensional_support
    lean_status: proved
    lean_source: WCTLean/Curvature.lean
    lean_declarations:
      - sqrt_inverse_length_squared
      - sqrt_kappa_sq_dim

  - sympy_id: CURV2
    registry: legacy
    sympy_claim: "kappa^2 + tau^2 has inverse-length-squared dimension"
    relationship: dimensional_support
    lean_status: proved
    lean_source: WCTLean/Curvature.lean
    lean_declarations:
      - kappa_sq_dim
      - tau_sq_dim

  - sympy_id: K1
    registry: legacy
    sympy_claim: "The charged-lepton Koide expression is numerically near 2/3"
    relationship: domain_safety_only
    lean_status: proved
    lean_source: WCTLean/Koide.lean
    lean_declarations:
      - koide_denominator_positive
      - koide_well_defined
      - koide_positive
    caveat: "Lean does not prove the numerical equality K = 2/3."
