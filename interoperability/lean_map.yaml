  lean_proved_means: The named Lean declaration is kernel-checked in wct-lean.
  lean_mapped_means: The canonical object has a maintained Lean definition, theorem, proposition, counterexample, or analytic contract beyond registry metadata.
  prohibition: A SymPy PASS must never be reported as a Lean proof.
