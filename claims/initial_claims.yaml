    evidence:
      - evidence_id: EVID-COMP-SYMPY
        type: SYMBOLIC_CHECK
        source: https://rickyjreyes.github.io/sympy/#M5
        status: CONDITIONAL
        independent: false
        description: The registry checks dimensional and counting relations but leaves encoding, precision, update-cost, and equivalence assumptions open.
      - evidence_id: EVID-COMP-WAVELOCK
        type: SIMULATION
        source: https://github.com/rickyjreyes/Wavelock
        status: CONDITIONAL
        independent: false
        description: WaveLock is an author-generated cryptographic research prototype with unresolved security proof obligations; it is not evidence for unrestricted classical P versus NP.
    empirical_status: MODEL_RELATIVE
    independent_replication: NONE
    qualification: All separation and equivalence statements are internal to explicitly defined computational models and must not be reported as an unrestricted solution to classical P versus NP.
    falsifiers:
      - A polynomial-overhead simulation invalidates the claimed model-relative separation under the same encoding, precision, and resource assumptions.
      - The declared curvature-resource restriction cannot be implemented or measured without exponential hidden overhead.
    unresolved_obligations:
      - Specify the encoding, precision model, update cost, and finite curvature-resource bound.
      - Separate physical-resource claims from classical complexity-class equivalence claims.
      - Provide theorem-level simulation relations between the WCC model and a standard computational model.
