name: Frozen SymPy and registry reproducibility

on:
  push:
    branches: [main]
    paths:
      - "wct_sympy/**"
      - "equations/**"
      - "claims/**"
      - "interoperability/**"
      - "scripts/**"
      - "tests/**"
      - "reproducibility/**"
      - "Makefile"
      - ".github/workflows/reproducibility.yml"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reproduce:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out symbolic audit
        uses: actions/checkout@v4
        with:
          path: wct-sympy
      - name: Check out pinned canonical equations
        uses: actions/checkout@v4
        with:
          repository: rickyjreyes/geometry_of_resonance
          ref: 16b3ea45a04d18e333b66c61ba9ebcf296d5289e
          path: geometry_of_resonance
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: wct-sympy/reproducibility/requirements.lock
      - name: Install exact dependencies
        working-directory: wct-sympy
        run: python -m pip install --requirement reproducibility/requirements.lock
      - name: Rebuild symbolic audit and effective registry
        working-directory: wct-sympy
        run: make reproduce GEOMETRY_DIR=../geometry_of_resonance
      - name: Upload regenerated registry and reproducibility report
        uses: actions/upload-artifact@v4
        with:
          name: symbolic-registry-${{ github.sha }}
          if-no-files-found: error
          path: wct-sympy/build/reproducibility/
